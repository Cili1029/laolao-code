version: "3.8"
services:
  namesrv:
    image: apache/rocketmq:5.4.0
    container_name: rmqnamesrv
    ports:
      - 9876:9876
    environment:
     # 压榨到 128M 堆内存，NameServer 完全够用
      - JAVA_OPT_EXT=-Xms128m -Xmx128m
    # 2. 限制 Docker 容器物理内存
    deploy:
      resources:
        limits:
          memory: 256M  # 物理内存给 256M
    networks:
      - rocketmq
    command: sh mqnamesrv
    
  broker:
    image: apache/rocketmq:5.4.0
    container_name: rmqbroker
    ports:
      - 10909:10909
      - 10911:10911
      - 10912:10912
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
      # 堆给 256M，堆外(直接内存)给 256M，共 512M 左右逻辑占用
      - JAVA_OPT_EXT=-Xms256m -Xmx256m -XX:MaxDirectMemorySize=256m
    deploy:
      resources:
        limits:
          memory: 768M  # 物理内存给 768M（留出系统 Buffer）
    depends_on:
      - namesrv
    networks:
      - rocketmq
    command: sh mqbroker

  proxy:
    image: apache/rocketmq:5.4.0
    container_name: rmqproxy
    networks:
      - rocketmq
    depends_on:
      - broker
      - namesrv
    ports:
      - 9080:9080
      - 9081:9081
    restart: on-failure
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
      # Proxy 主要是转发，给 256M 堆和 128M 堆外即可
      - JAVA_OPT_EXT=-Xms256m -Xmx256m -XX:MaxDirectMemorySize=128m
    deploy:
      resources:
        limits:
          memory: 512M  # 物理内存给 512M
    volumes:
      # 挂载自定义的配置文件
      - ./rmq-proxy.json:/home/rocketmq/rocketmq-5.4.0/conf/rmq-proxy.json
    command: sh mqproxy -pc /home/rocketmq/rocketmq-5.4.0/conf/rmq-proxy.json
  
  dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: rmqdashboard
    ports:
      - 9877:8082
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
      # Dashboard 是 SpringBoot，256M 是比较经济的配置
      - JAVA_OPTS=-Xms256m -Xmx256m
    deploy:
      resources:
        limits:
          # 容器物理内存限制，比堆内存大 256M 左右即可
          memory: 400M  # 物理内存给 400M
    networks:
      - rocketmq
networks:
  rocketmq:
    driver: bridge
